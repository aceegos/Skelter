<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#103c2d">
<title>SKELTER</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--felt:#103c2d;--panel:#06281d;--gold:#edcc63;--red:#b52635}
*{box-sizing:border-box}body{margin:0;background:var(--felt);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;min-height:100vh}
main{max-width:760px;margin:auto;padding:calc(10px + env(safe-area-inset-top)) 10px calc(18px + env(safe-area-inset-bottom))}
h1{letter-spacing:.16em;margin:4px 0 10px}.zone{background:var(--panel);border-radius:16px;padding:9px;margin:8px 0}
.hand{display:flex;justify-content:center;overflow-x:auto;padding:14px;min-height:96px}
.card{width:58px;min-width:58px;height:84px;background:#fff;color:#111;border:2px solid #ddd;border-radius:8px;margin-left:-14px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;box-shadow:0 4px 8px #0005}
.card:first-child{margin-left:0}.red{color:var(--red)}.legal{outline:4px solid var(--gold);transform:translateY(-6px);cursor:pointer}.back{background:repeating-linear-gradient(45deg,#202824 0 8px,#d5b85c 8px 10px);color:white}
.row{display:grid;grid-template-columns:1fr 1fr;align-items:center}.status{font-size:19px;font-weight:800;min-height:50px;display:grid;place-items:center;padding:4px}
button{padding:12px 18px;margin:6px;border:0;border-radius:24px;background:var(--gold);font-weight:800;font-size:16px;color:#15241e}button:disabled{opacity:.4}
.hide{display:none!important}#flash{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;padding:20px;font-size:clamp(40px,11vw,92px);font-weight:1000;z-index:9}
#chooser{padding:8px}.suit{font-size:30px;background:#fff}.small{font-size:12px;opacity:.7}
</style>
</head>
<body>
<main>
<h1>SKELTER</h1>
<div class="zone">COMPUTER <span id="cpuCount"></span><div id="cpu" class="hand"></div></div>
<div id="status" class="status"></div><div id="house"></div>
<div class="zone row"><div>TABLE<div id="table" class="hand"></div></div><div>DRAW <span id="deckCount"></span><div id="draw" class="hand"></div></div></div>
<div id="chooser" class="hide"><b>Choose the Joker suit</b><br><button class="suit" data-suit="S">♠</button><button class="suit" data-suit="H">♥</button><button class="suit" data-suit="D">♦</button><button class="suit" data-suit="C">♣</button></div>
<button id="skelter" disabled>SKELTER!</button>
<div class="zone">YOU <span id="humanCount"></span><div id="human" class="hand"></div></div>
<button id="newGame">New Game</button>
<div class="small">Gold-outlined cards are legal. Tap the draw pile only when you have no legal play.</div>
</main><div id="flash"></div>
<script src="app.js"></script>
</body></html>
